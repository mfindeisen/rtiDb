server {
    listen 80;
    server_name localhost;
    
    # Allow large RTI file uploads
    client_max_body_size 5000M;

    location = /robots.txt {
        root /usr/share/nginx/html;
    }

    location = /auth {
        internal;
        proxy_pass http://server:3000/api/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
    }

    location @login_redirect {
        return 302 /login?redirect=$request_uri;
    }

    location /docs/ {
        auth_request /auth;
        error_page 401 = @login_redirect;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /docs/index.html;
    }

    # Vue app (auth handled in-app via JWT login)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy to backend
    location /api/ {
        proxy_pass http://server:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Cookie $http_cookie;
        
        # Required for SSE (Server-Sent Events) progress updates
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # Static uploads proxy
    location /static/uploads/ {
        proxy_pass http://server:3000/static/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
