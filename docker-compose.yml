version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: rtidb-server
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_key_change_in_production}
      - TRANSFORMERS_CACHE=/repo/server/.clip-model-cache
      - GOGC=20
    volumes:
      - server_uploads:/repo/server/uploads
      - server_data:/repo/server/data

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: rtidb-client
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - server

volumes:
  server_uploads:
    name: rtidb_uploads
  server_data:
    name: rtidb_data
